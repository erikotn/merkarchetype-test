    <style>
        :root {
            --accent: #E6007E;
            --accent-soft: #FCE4F1;
            --ink: #1A1A1A;
            --paper: #FAFAFA;
            --line: #E5E5E5;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--paper);
            color: var(--ink);
        }
        h1, h2, h3, .display { font-family: 'Roboto Slab', serif; }
        .accent-bg { background: var(--accent); }
        .accent-text { color: var(--accent); }
        .accent-border { border-color: var(--accent); }
        .accent-soft-bg { background: var(--accent-soft); }

        /* Subtiele textuur */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.025) 1px, transparent 0);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }
        main { position: relative; z-index: 1; }

        /* Animaties */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.4s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .slide-in { animation: slideIn 0.35s ease-out; }

        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            60% { transform: scale(1.04); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop { animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Scale-knoppen */
        .scale-btn {
            transition: all 0.2s ease;
            border: 2px solid var(--line);
            background: white;
        }
        .scale-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
        .scale-btn.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 6px 20px rgba(230, 0, 126, 0.35);
            transform: scale(1.05);
        }

        /* Print */
        @media print {
            body::before { display: none; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
            .print-page-break { page-break-before: always; }
        }
        .print-only { display: none; }
    </style>

        // ─── HULPMETHODEN ────────────────────────────────────────────────
        const ARCHETYPE_KEYS = Object.keys(archetypes);
        const STORAGE_KEY = 'merkarchetype:state:v2';

        function emptyScores() {
            const s = {};
            ARCHETYPE_KEYS.forEach(k => s[k] = 0);
            return s;
        }

        function calcScores(answers) {
            const scores = emptyScores();
            questions.forEach(q => {
                const a = answers[q.id];
                if (a && q.archetypeMapping[a]) {
                    Object.entries(q.archetypeMapping[a]).forEach(([k, v]) => { scores[k] += v; });
                }
            });
            return scores;
        }

        function topThree(scores) {
            const sorted = Object.entries(scores).sort(([,a],[,b]) => b-a);
            const top3 = sorted.slice(0, 3);
            const total = top3.reduce((s,[,v]) => s+v, 0);
            const pct = total === 0
                ? top3.map(([k]) => [k, 33])
                : top3.map(([k,v]) => [k, Math.round((v/total) * 100)]);
            const sum = pct.reduce((s,[,p]) => s+p, 0);
            if (sum !== 100 && pct[0]) pct[0][1] += (100 - sum);
            return { primary: pct[0], secondary: pct[1], tertiary: pct[2] };
        }

        function aggregateTeam(participants) {
            const sum = emptyScores();
            participants.forEach(p => {
                const s = calcScores(p.answers);
                ARCHETYPE_KEYS.forEach(k => sum[k] += s[k]);
            });
            return sum;
        }

        function encodeAnswers(answers) {
            return questions.map(q => answers[q.id] || 0).join('');
        }
        function decodeAnswers(str) {
            if (!str || str.length !== 30) return null;
            const out = {};
            for (let i = 0; i < 30; i++) {
                const v = parseInt(str[i], 10);
                if (v >= 1 && v <= 5) out[questions[i].id] = v;
            }
            return out;
        }

                        const a = (pct / 100) * 360;
                        const sa = angle, ea = angle + a;
                        const sr = sa * Math.PI / 180, er = ea * Math.PI / 180;
                        const x1 = cx + r * Math.cos(sr), y1 = cy + r * Math.sin(sr);
                        const x2 = cx + r * Math.cos(er), y2 = cy + r * Math.sin(er);
                        const large = a > 180 ? 1 : 0;
                        const path = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
                        angle = ea;
                        return <path key={i} d={path} fill={d.color} stroke="white" strokeWidth="3" />;
                    })}
                </svg>
            );

            // screen: intro | team-setup | team-name | quiz | result | team-result | shared

            const [mode, setMode] = useState('solo'); // 'solo' | 'team'
            const [answers, setAnswers] = useState({});
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [participantName, setParticipantName] = useState('');
            const [sessionName, setSessionName] = useState('');
            const [teamParticipants, setTeamParticipants] = useState([]);
            const [hasSavedSolo, setHasSavedSolo] = useState(false);
            const [hasSavedTeam, setHasSavedTeam] = useState(false);
            const [shareUrl, setShareUrl] = useState('');

            // ─ URL hash check op load (gedeelde resultaten) ────
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const r = params.get('r');
                const n = params.get('n');
                if (r) {
                    const decoded = decodeAnswers(r);
                    if (decoded && Object.keys(decoded).length === 30) {
                        setAnswers(decoded);
                        setParticipantName(n ? decodeURIComponent(n) : '');
                        setMode('solo');
                        setScreen('result');
                        return;
                    }
                }
                // Geen URL → check localStorage
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const saved = JSON.parse(raw);
                        if (saved.solo && Object.keys(saved.solo.answers || {}).length > 0) setHasSavedSolo(true);
                        if (saved.team && (saved.team.participants?.length > 0 || Object.keys(saved.team.currentAnswers || {}).length > 0)) setHasSavedTeam(true);
                    }
                } catch (e) { /* ignore */ }
            }, []);

            // ─ Auto-save naar localStorage ─────────────────────
            useEffect(() => {
                if (screen === 'shared' || screen === 'intro') return;
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    const state = raw ? JSON.parse(raw) : {};
                    if (mode === 'solo' && screen === 'quiz') {
                        state.solo = { answers, currentQuestion };
                    } else if (mode === 'team') {
                        state.team = {
                            sessionName,
                            participants: teamParticipants,
                            currentParticipantName: participantName,
                            currentAnswers: answers,
                            currentQuestion
                        };
                    }
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                } catch (e) { /* quota probably */ }
            }, [screen, mode, answers, currentQuestion, sessionName, teamParticipants, participantName]);

            const startSolo = () => {
                setMode('solo');
                setAnswers({});
                setCurrentQuestion(0);
                setParticipantName('');
                setScreen('quiz');
            };

            const startTeam = () => {
                setMode('team');
                setAnswers({});
                setCurrentQuestion(0);
                setSessionName('');
                setTeamParticipants([]);
                setParticipantName('');
                setScreen('team-setup');
            };

            const resumeSolo = () => {
                try {
                    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}').solo;
                    if (saved) {
                        setMode('solo');
                        setAnswers(saved.answers || {});
                        setCurrentQuestion(saved.currentQuestion || 0);
                        setScreen('quiz');
                    }
                } catch (e) {}
            };

            const resumeTeam = () => {
                try {
                    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}').team;
                    if (saved) {
                        setMode('team');
                        setSessionName(saved.sessionName || '');
                        setTeamParticipants(saved.participants || []);
                        setParticipantName(saved.currentParticipantName || '');
                        setAnswers(saved.currentAnswers || {});
                        setCurrentQuestion(saved.currentQuestion || 0);
                        // Bepaal waar we zitten
                        if (Object.keys(saved.currentAnswers || {}).length === 30) {
                            setScreen('result');
                        } else if (saved.currentParticipantName && Object.keys(saved.currentAnswers || {}).length > 0) {
                            setScreen('quiz');
                        } else if (saved.participants?.length > 0) {
                            setScreen('team-name');
                        } else {
                            setScreen('team-setup');
                        }
                    }
                } catch (e) {}
            };

            const cancelToIntro = () => {
                if (confirm('Sessie afbreken? Je voortgang wordt bewaard zodat je later kunt hervatten.')) {
                    setScreen('intro');
                }
            };

            const handleAnswer = (qid, val) => {
                setAnswers(prev => ({ ...prev, [qid]: val }));
                // Auto-advance: als een vraag voor het eerst beantwoord wordt en niet de laatste is
                if (answers[qid] === undefined && currentQuestion < questions.length - 1) {
                    setTimeout(() => setCurrentQuestion(c => c + 1), 350);
                }
            };

            const handleComplete = () => setScreen('result');

            const handleNewParticipant = () => {
                // Sla de huidige deelnemer op in het team
                setTeamParticipants(prev => [...prev, { name: participantName, answers, completedAt: Date.now() }]);
                setAnswers({});
                setCurrentQuestion(0);
                setParticipantName('');
                setScreen('team-name');
            };

            const handleViewTeam = () => {
                // Voeg de huidige deelnemer ook toe als nog niet gedaan
                let participants = teamParticipants;
                if (Object.keys(answers).length === 30 && participantName) {
                    const exists = teamParticipants.some(p => p.name === participantName && JSON.stringify(p.answers) === JSON.stringify(answers));
                    if (!exists) {
                        participants = [...teamParticipants, { name: participantName, answers, completedAt: Date.now() }];
                        setTeamParticipants(participants);
                    }
                }
                setScreen('team-result');
            };

            const handleAddTeamParticipant = () => {
                setAnswers({});
                setCurrentQuestion(0);
                setParticipantName('');
                setScreen('team-name');
            };

            const handleReset = () => {
                if (!confirm('Weet je zeker dat je opnieuw wilt beginnen? Alle antwoorden gaan verloren.')) return;
                try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
                setAnswers({});
                setCurrentQuestion(0);
                setParticipantName('');
                setSessionName('');
                setTeamParticipants([]);
                setScreen('intro');
                setHasSavedSolo(false);
                setHasSavedTeam(false);
                // Verwijder URL params bij reset
                if (window.location.search) {
                    window.history.replaceState({}, '', window.location.pathname);
                }
            };

            const handleShare = () => {
                const encoded = encodeAnswers(answers);
                const url = `${window.location.origin}${window.location.pathname}?r=${encoded}${participantName ? `&n=${encodeURIComponent(participantName)}` : ''}`;
                setShareUrl(url);
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(url).then(() => {
                        alert('Link gekopieerd naar klembord!\n\n' + url);
                    }).catch(() => {
                        prompt('Kopieer deze link:', url);
                    });
                } else {
                    prompt('Kopieer deze link:', url);
                }
            };

            // ─ Render ────────────────────────────────────────
            if (screen === 'intro') {
                return <IntroScreen
                    onSolo={startSolo}
                    onTeam={startTeam}
                    hasSavedSolo={hasSavedSolo}
                    hasSavedTeam={hasSavedTeam}
                    onResumeSolo={resumeSolo}
                    onResumeTeam={resumeTeam}
                />;
            }
            if (screen === 'team-setup') {
                return <NameInput
                    title="Team-sessie starten"
                    subtitle="Geef de sessie een naam, bijvoorbeeld 'Marketingteam Q2'."
                    placeholder="Naam van de sessie"
                    buttonLabel="Volgende →"
                    onSubmit={(name) => { setSessionName(name); setScreen('team-name'); }}
                    onCancel={() => setScreen('intro')}
                />;
            }
            if (screen === 'team-name') {
                return <NameInput
                    title={teamParticipants.length === 0 ? "Eerste deelnemer" : `Deelnemer ${teamParticipants.length + 1}`}
                    subtitle={teamParticipants.length === 0 ? `Sessie: ${sessionName}` : `Eerder beantwoord: ${teamParticipants.map(p => p.name).join(', ')}`}
                    placeholder="Voornaam of bijnaam"
                    buttonLabel="Start test →"
                    onSubmit={(name) => { setParticipantName(name); setScreen('quiz'); }}
                    onCancel={teamParticipants.length > 0 ? () => setScreen('team-result') : () => setScreen('intro')}
                />;
            }
            if (screen === 'quiz') {
                return <Quiz
                    answers={answers}
                    currentQuestion={currentQuestion}
                    onAnswer={handleAnswer}
                    onNext={() => setCurrentQuestion(c => Math.min(questions.length - 1, c + 1))}
                    onPrev={() => setCurrentQuestion(c => Math.max(0, c - 1))}
                    onComplete={handleComplete}
                    onCancel={cancelToIntro}
                    participantName={mode === 'team' ? participantName : null}
                    totalParticipants={null}
                    currentParticipantIndex={teamParticipants.length}
                />;
            }
            if (screen === 'result') {
                return <ResultIndividual
                    name={participantName}
                    answers={answers}
                    isTeamMode={mode === 'team'}
                    onReset={handleReset}
                    onNewParticipant={handleNewParticipant}
                    onViewTeam={handleViewTeam}
                    onShare={handleShare}
                />;
            }
            if (screen === 'team-result') {
                return <ResultTeam
                    sessionName={sessionName}
                    participants={teamParticipants}
                    onAddParticipant={handleAddTeamParticipant}
                    onReset={handleReset}
                />;
            }
            return <div className="text-center p-12">Loading...</div>;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
