    <style>
        :root {
            --accent: #E6007E;
            --accent-soft: #FCE4F1;
            --ink: #1A1A1A;
            --paper: #FAFAFA;
            --line: #E5E5E5;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--paper);
            color: var(--ink);
        }
        h1, h2, h3, .display { font-family: 'Roboto Slab', serif; }
        .accent-bg { background: var(--accent); }
        .accent-text { color: var(--accent); }
        .accent-border { border-color: var(--accent); }
        .accent-soft-bg { background: var(--accent-soft); }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.025) 1px, transparent 0);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }
        main { position: relative; z-index: 1; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.4s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .slide-in { animation: slideIn 0.35s ease-out; }

        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            60% { transform: scale(1.04); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop { animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .scale-btn {
            transition: all 0.2s ease;
            border: 2px solid var(--line);
            background: white;
        }
        .scale-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
        .scale-btn.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 6px 20px rgba(230, 0, 126, 0.35);
            transform: scale(1.05);
        }

        @media print {
            body::before { display: none; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
        }
        .print-only { display: none; }

        const ARCHETYPE_KEYS = Object.keys(archetypes);

        function emptyScores() {
            const s = {};
            ARCHETYPE_KEYS.forEach(k => s[k] = 0);
            return s;
        }

        function calcScores(answers) {
            const scores = emptyScores();
            questions.forEach(q => {
                const a = answers[q.id];
                if (a && q.archetypeMapping[a]) {
                    Object.entries(q.archetypeMapping[a]).forEach(([k, v]) => { scores[k] += v; });
                }
            });
            return scores;
        }

        function topThree(scores) {
            const sorted = Object.entries(scores).sort(([,a],[,b]) => b-a);
            const top3 = sorted.slice(0, 3);
            const total = top3.reduce((s,[,v]) => s+v, 0);
            const pct = total === 0
                ? top3.map(([k]) => [k, 33])
                : top3.map(([k,v]) => [k, Math.round((v/total) * 100)]);
            const sum = pct.reduce((s,[,p]) => s+p, 0);
            if (sum !== 100 && pct[0]) pct[0][1] += (100 - sum);
            return { primary: pct[0], secondary: pct[1], tertiary: pct[2] };
        }

        function aggregateTeam(participants) {
            const sum = emptyScores();
            participants.forEach(p => {
                const s = calcScores(p.answers);
                ARCHETYPE_KEYS.forEach(k => sum[k] += s[k]);
            });
            return sum;
        }

        function encodeAnswers(answers) {
            return questions.map(q => answers[q.id] || 0).join('');
        }
        function decodeAnswers(str) {
            if (!str || str.length !== 30) return null;
            const out = {};
            for (let i = 0; i < 30; i++) {
                const v = parseInt(str[i], 10);
                if (v >= 1 && v <= 5) out[questions[i].id] = v;
            }
            return out;
        }

        // GET met query params i.p.v. POST: Apps Script redirect strip de body
        // bij POST (302 → fetch volgt en verliest body). GET werkt wel.
        async function api(action, data = {}) {
            if (!API_AVAILABLE) {
                throw new Error('Online team-modus is nog niet geconfigureerd. Zie SETUP.md.');
            }
            const params = new URLSearchParams({ action });
            Object.entries(data).forEach(([k, v]) => {
                if (v !== undefined && v !== null) params.append(k, String(v));
            });
            const res = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`, {
                method: 'GET',
                redirect: 'follow'
            });
            if (!res.ok) throw new Error('Netwerkfout: ' + res.status);
            const json = await res.json();
            if (json.error) throw new Error(json.error);
            return json;
        }

                const without = list.filter(s => s.sessionId !== sessionId);
                without.unshift({ sessionId, hostToken, name, createdAt: Date.now() });
                localStorage.setItem(HOST_SESSIONS_KEY, JSON.stringify(without.slice(0, 10)));

        // ─── PIE CHART ───────────────────────────────────────────────────
        function PieChart({ data, size = 300 }) {
            const total = data.reduce((s, d) => s + d.value, 0);
            let angle = -90;
            const cx = size / 2, cy = size / 2, r = size / 2 - 10;
            return (
                <svg viewBox={`0 0 ${size} ${size}`} className="w-full max-w-sm mx-auto">
                    {data.map((d, i) => {
                        const pct = (d.value / total) * 100;
                        const a = (pct / 100) * 360;
                        const sa = angle, ea = angle + a;
                        const sr = sa * Math.PI / 180, er = ea * Math.PI / 180;
                        const x1 = cx + r * Math.cos(sr), y1 = cy + r * Math.sin(sr);
                        const x2 = cx + r * Math.cos(er), y2 = cy + r * Math.sin(er);
                        const large = a > 180 ? 1 : 0;
                        const path = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
                        angle = ea;
                        return <path key={i} d={path} fill={d.color} stroke="white" strokeWidth="3" />;
                    })}
                </svg>
            );

        function SessionHostDashboard({ sessionId, hostToken, onBack }) {
            const [info, setInfo] = useState(null);
            const [error, setError] = useState(null);
            const [loading, setLoading] = useState(true);
            const [refreshing, setRefreshing] = useState(false);
            const [showResults, setShowResults] = useState(false);
            const [results, setResults] = useState(null);

            const baseUrl = window.location.origin + window.location.pathname;
            const participantUrl = `${baseUrl}?session=${sessionId}`;
            const hostUrl = `${baseUrl}?session=${sessionId}&host=${hostToken}`;

            const refresh = useCallback(async () => {
                setRefreshing(true);
                try {
                    const r = await api('results', { id: sessionId, host: hostToken });
                    setInfo({ sessionName: r.sessionName, status: r.status, count: r.responses.length });
                    setResults(r);
                    setError(null);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setRefreshing(false);
                    setLoading(false);
                }
            }, [sessionId, hostToken]);

            useEffect(() => { refresh(); }, [refresh]);

            const closeSession = async () => {
                if (!confirm('Sessie sluiten? Daarna kunnen er geen antwoorden meer worden ingediend.')) return;
                try {
                    await api('close', { id: sessionId, host: hostToken });
                    await refresh();
                } catch (e) {
                    alert('Sluiten mislukt: ' + e.message);
                }
            };

            if (loading) {
                return <CenteredMessage icon="⏳" title="Sessie laden..." text="" />;
            }
            if (error && !info) {
                return <CenteredMessage icon="⚠️" title="Kan sessie niet laden"
                    text={error} actionLabel="Terug naar start" onAction={onBack} />;
            }

            if (showResults && results) {
                return <ResultTeam
                    sessionName={info.sessionName}
                    participants={results.responses}
                    isOnline={true}
                    status={info.status}
                    onRefresh={refresh}
                    refreshing={refreshing}
                    onClose={info.status === 'open' ? closeSession : null}
                    onReset={onBack}
                />;

            return (
                <div className="max-w-3xl mx-auto px-4 sm:px-6 py-8 sm:py-12 fade-up">
                    <button onClick={onBack} className="text-gray-500 hover:text-pink-600 transition mb-6 text-sm">← Terug naar start</button>

                                : <span className="ml-1 px-2 py-0.5 text-xs rounded-full bg-gray-200 text-gray-600">gesloten</span>}

                    </div>

                    {info.status === 'open' && (
                        <div className="space-y-3 mb-8">
                            <CopyableLink label="Deelnemers-link (deze deel je)" url={participantUrl} />
                            <CopyableLink label="Host-link (alleen voor jou — bewaar deze!)" url={hostUrl} />
                            <p className="text-xs text-gray-500 px-1">⚠️ Bookmark de host-link of bewaar 'm in een notitie. Zonder dat token kom je niet meer bij de resultaten.</p>
                        </div>
                    )}

                    <div className="bg-white border border-gray-200 rounded-2xl p-6 mb-6">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <p className="text-3xl font-black">{info.count}</p>
                                <p className="text-sm text-gray-500">{info.count === 1 ? 'deelnemer' : 'deelnemers'} ingediend</p>
                            </div>
                            <button onClick={refresh} disabled={refreshing}
                                className="bg-white border-2 accent-border accent-text font-semibold px-4 py-2 rounded-lg hover:bg-pink-50 transition text-sm disabled:opacity-50">
                                {refreshing ? 'Verversen...' : '🔄 Ververs'}

                            <div className="space-y-2 mt-4">

                    <div className="flex flex-wrap gap-3">

        // ─── APP ─────────────────────────────────────────────────────────
        function App() {
            const [screen, setScreen] = useState('intro');
            const [mode, setMode] = useState('solo');
            const [answers, setAnswers] = useState({});
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [participantName, setParticipantName] = useState('');
            const [sessionName, setSessionName] = useState('');
            const [teamParticipants, setTeamParticipants] = useState([]);
            const [savedSession, setSavedSession] = useState(null);
            const [hostedSessions, setHostedSessions] = useState([]);
            const [busy, setBusy] = useState(false);
            const [submissionStatus, setSubmissionStatus] = useState(null);
            const [completing, setCompleting] = useState(false);
            const [adminInitialKey, setAdminInitialKey] = useState('');

            // Online sessie state
            const [activeSessionId, setActiveSessionId] = useState(null);
            const [activeHostToken, setActiveHostToken] = useState(null);

            // ─ URL routing op load ────────────────────────────
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const sessionParam = params.get('session');
                const hostParam = params.get('host');
                const r = params.get('r');

                // 0. Admin via URL
                const adminParam = params.get('admin');
                if (adminParam !== null) {
                    setAdminInitialKey(adminParam);
                    setScreen('admin');
                    return;
                }

                // 1. Gedeeld solo-resultaat
                if (r) {
                    const decoded = decodeAnswers(r);
                    if (decoded && Object.keys(decoded).length === 30) {
                        setAnswers(decoded);
                        setParticipantName(params.get('n') ? decodeURIComponent(params.get('n')) : '');
                        setMode('solo');
                        setScreen('result');
                        return;
                    }
                }

                // 2. Online sessie — host
                if (sessionParam && hostParam) {
                    setActiveSessionId(sessionParam);
                    setActiveHostToken(hostParam);
                    setMode('session-host');
                    setScreen('session-host');
                    return;
                }

                // 3. Online sessie — deelnemer
                if (sessionParam) {
                    setActiveSessionId(sessionParam);
                    setMode('session-participant');
                    setScreen('session-checking');
                    (async () => {
                        try {
                            const info = await api('session_info', { id: sessionParam });
                            if (info.error) {
                                setScreen('session-not-found');
                            } else if (info.status === 'closed') {
                                setSessionName(info.name);
                                setScreen('session-closed');
                            } else {
                                setSessionName(info.name);
                                setScreen('session-name');
                            }
                        } catch (e) {
                            setScreen('session-error');
                        }
                    })();
                    return;
                }

                // 4. Lokale onafgemaakte sessie?
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const saved = JSON.parse(raw);
                        if (saved.solo && Object.keys(saved.solo.answers || {}).length > 0) {
                            setSavedSession({ type: 'solo', ...saved.solo });
                        } else if (saved.team && (saved.team.participants?.length > 0 || Object.keys(saved.team.currentAnswers || {}).length > 0)) {
                            setSavedSession({ type: 'team', ...saved.team });
                        }
                    }
                } catch (e) {}

                setHostedSessions(getHostedSessions());
            }, []);

            // ─ Auto-save lokale state ─────────────────────────
            useEffect(() => {
                if (screen === 'intro' || mode === 'session-participant' || mode === 'session-host') return;
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    const state = raw ? JSON.parse(raw) : {};
                    if (mode === 'solo' && screen === 'quiz') {
                        state.solo = { answers, currentQuestion };
                    } else if (mode === 'team') {
                        state.team = {
                            sessionName,
                            participants: teamParticipants,
                            currentParticipantName: participantName,
                            currentAnswers: answers,
                            currentQuestion
                        };
                    }
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                } catch (e) {}
            }, [screen, mode, answers, currentQuestion, sessionName, teamParticipants, participantName]);

            const startSolo = () => {
                setMode('solo');
                setAnswers({});
                setCurrentQuestion(0);
                setParticipantName('');
                setScreen('quiz');
            };
            const startTeamLocal = () => {
                setMode('team');
                setAnswers({});
                setCurrentQuestion(0);
                setSessionName('');
                setTeamParticipants([]);
                setParticipantName('');
                setScreen('team-setup');
            };
            const startSessionCreate = () => {
                if (!API_AVAILABLE) {
                    alert('Online team-modus is nog niet geconfigureerd. Vraag de eigenaar van deze tool om SETUP.md te volgen.');
                    return;
                }
                setMode('session-host');
                setSessionName('');
                setScreen('session-create');
            };

            const handleResume = () => {
                if (!savedSession) return;
                if (savedSession.type === 'solo') {
                    setMode('solo');
                    setAnswers(savedSession.answers || {});
                    setCurrentQuestion(savedSession.currentQuestion || 0);
                    setScreen('quiz');
                } else {
                    setMode('team');
                    setSessionName(savedSession.sessionName || '');
                    setTeamParticipants(savedSession.participants || []);
                    setParticipantName(savedSession.currentParticipantName || '');
                    setAnswers(savedSession.currentAnswers || {});
                    setCurrentQuestion(savedSession.currentQuestion || 0);
                    if (Object.keys(savedSession.currentAnswers || {}).length === 30) setScreen('result');
                    else if (savedSession.currentParticipantName && Object.keys(savedSession.currentAnswers || {}).length > 0) setScreen('quiz');
                    else if (savedSession.participants?.length > 0) setScreen('team-name');
                    else setScreen('team-setup');
                }
            };

            const cancelToIntro = () => {
                if (confirm('Sessie afbreken? Je voortgang wordt bewaard zodat je later kunt hervatten.')) {
                    setScreen('intro');
                    setHostedSessions(getHostedSessions());
                }
            };

            const handleAnswer = (qid, val) => {
                const wasUnanswered = answers[qid] === undefined;
                setAnswers(prev => ({ ...prev, [qid]: val }));
                if (wasUnanswered && currentQuestion < questions.length - 1) {
                    setTimeout(() => setCurrentQuestion(c => c + 1), 350);
                }
            };

            const handleComplete = async () => {
                if (mode === 'session-participant') {
                    setCompleting(true);
                    try {
                        await api('submit', {
                            id: activeSessionId,
                            name: participantName,
                            answers: JSON.stringify(answers)
                        });
                        setSubmissionStatus('sent');
                    } catch (e) {
                        setSubmissionStatus('failed');
                    }
                    setCompleting(false);
                    setScreen('result');
                    return;
                }
                setScreen('result');
            };

            const handleNewParticipant = () => {
                setTeamParticipants(prev => [...prev, { name: participantName, answers, completedAt: Date.now() }]);
                setAnswers({});
                setCurrentQuestion(0);
                setParticipantName('');
                setScreen('team-name');
            };

            const handleViewTeam = () => {
                let participants = teamParticipants;
                if (Object.keys(answers).length === 30 && participantName) {
                    const exists = teamParticipants.some(p => p.name === participantName && JSON.stringify(p.answers) === JSON.stringify(answers));
                    if (!exists) {
                        participants = [...teamParticipants, { name: participantName, answers, completedAt: Date.now() }];
                        setTeamParticipants(participants);
                    }
                }
                setScreen('team-result');
            };

            const handleAddTeamParticipant = () => {
                setAnswers({});
                setCurrentQuestion(0);
                setParticipantName('');
                setScreen('team-name');
            };

            const handleReset = () => {
                if (!confirm('Weet je zeker dat je opnieuw wilt beginnen?')) return;
                try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
                setAnswers({});
                setCurrentQuestion(0);
                setParticipantName('');
                setSessionName('');
                setTeamParticipants([]);
                setActiveSessionId(null);
                setActiveHostToken(null);
                setSubmissionStatus(null);
                setSavedSession(null);
                setScreen('intro');
                setHostedSessions(getHostedSessions());
                if (window.location.search) window.history.replaceState({}, '', window.location.pathname);
            };

            const handleShare = () => {
                const encoded = encodeAnswers(answers);
                const url = `${window.location.origin}${window.location.pathname}?r=${encoded}${participantName ? `&n=${encodeURIComponent(participantName)}` : ''}`;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(url).then(() => alert('Link gekopieerd!\n\n' + url)).catch(() => prompt('Kopieer:', url));
                } else { prompt('Kopieer:', url); }
            };

            const handleSessionCreate = async (name) => {
                setBusy(true);
                try {
                    const res = await api('create_session', { name });
                    rememberHostedSession(res.sessionId, res.hostToken, res.name);
                    setActiveSessionId(res.sessionId);
                    setActiveHostToken(res.hostToken);
                    setSessionName(res.name);
                    // Update URL
                    const newUrl = `${window.location.pathname}?session=${res.sessionId}&host=${res.hostToken}`;
                    window.history.replaceState({}, '', newUrl);
                    setScreen('session-host');
                } catch (e) {
                    alert('Sessie aanmaken mislukt: ' + e.message);
                }
                setBusy(false);
            };

            const handleParticipantStart = (name) => {
                setParticipantName(name);
                setAnswers({});
                setCurrentQuestion(0);
                setScreen('quiz');
            };

            // ─ Render ────────────────────────────────────────
            if (screen === 'intro') {
                return <IntroScreen
                    onSolo={startSolo}
                    onTeamLocal={startTeamLocal}
                    onSessionCreate={startSessionCreate}
                    savedSession={savedSession}
                    hostedSessions={hostedSessions}
                    onResume={handleResume}
                    onAdmin={() => { setAdminInitialKey(''); setScreen('admin'); }}
                />;
            }
            if (screen === 'admin') {
                return <AdminScreen
                    initialKey={adminInitialKey}
                    onBack={() => {
                        if (window.location.search.includes('admin=')) {
                            window.history.replaceState({}, '', window.location.pathname);
                        }
                        setScreen('intro');
                    }}
                />;
            }

            // Online sessie — deelnemer flow
            if (screen === 'session-checking') {
                return <CenteredMessage icon="⏳" title="Sessie checken..." text="Even kijken of de sessie open is." />;
            }
            if (screen === 'session-not-found') {
                return <CenteredMessage icon="🔍" title="Sessie niet gevonden"
                    text="De link klopt niet of de sessie is verwijderd. Vraag de host om een nieuwe link."
                    actionLabel="Naar de startpagina" onAction={handleReset} />;
            }
            if (screen === 'session-closed') {
                return <CenteredMessage icon="🔒" title="Sessie gesloten"
                    text={`De sessie "${sessionName}" is door de host gesloten. Je kunt geen antwoorden meer indienen.`}
                    actionLabel="Naar de startpagina" onAction={handleReset} />;
            }
            if (screen === 'session-error') {
                return <CenteredMessage icon="⚠️" title="Verbindingsfout"
                    text="De sessie kon niet worden geladen. Check je internetverbinding en probeer opnieuw."
                    actionLabel="Probeer opnieuw" onAction={() => window.location.reload()}
                    secondaryActionLabel="Startpagina" onSecondaryAction={handleReset} />;
            }
            if (screen === 'session-name') {
                return <NameInput
                    title={`Sessie: ${sessionName}`}
                    subtitle="Vul je naam in om te beginnen. De host ziet je antwoorden."
                    placeholder="Voornaam of bijnaam"
                    buttonLabel="Start test →"
                    onSubmit={handleParticipantStart}
                    onCancel={handleReset}
                />;
            }

            // Online sessie — host flow
            if (screen === 'session-create') {
                return <NameInput
                    title="Online sessie starten"
                    subtitle="Geef de sessie een naam, bv. 'Marketingteam Q2'."
                    placeholder="Naam van de sessie"
                    buttonLabel="Aanmaken →"
                    busy={busy}
                    onSubmit={handleSessionCreate}
                    onCancel={() => setScreen('intro')}
                />;
            }
            if (screen === 'session-host') {
                return <SessionHostDashboard
                    sessionId={activeSessionId}
                    hostToken={activeHostToken}
                    onBack={handleReset}
                />;
            }

            // Lokaal team flow
            if (screen === 'team-setup') {
                return <NameInput
                    title="Team-sessie starten"
                    subtitle="Geef de sessie een naam, bv. 'Marketingteam Q2'."
                    placeholder="Naam van de sessie"
                    buttonLabel="Volgende →"
                    onSubmit={(name) => { setSessionName(name); setScreen('team-name'); }}
                    onCancel={() => setScreen('intro')}
                />;
            }
            if (screen === 'team-name') {
                return <NameInput
                    title={teamParticipants.length === 0 ? "Eerste deelnemer" : `Deelnemer ${teamParticipants.length + 1}`}
                    subtitle={teamParticipants.length === 0 ? `Sessie: ${sessionName}` : `Eerder beantwoord: ${teamParticipants.map(p => p.name).join(', ')}`}
                    placeholder="Voornaam of bijnaam"
                    buttonLabel="Start test →"
                    onSubmit={(name) => { setParticipantName(name); setScreen('quiz'); }}
                    onCancel={teamParticipants.length > 0 ? () => setScreen('team-result') : () => setScreen('intro')}
                />;
            }

            // Quiz (alle modes)
            if (screen === 'quiz') {
                let headerLabel = null;
                if (mode === 'team') headerLabel = `Deelnemer ${teamParticipants.length + 1}: ${participantName}`;
                if (mode === 'session-participant') headerLabel = `Sessie: ${sessionName} · ${participantName}`;
                return <Quiz
                    answers={answers}
                    currentQuestion={currentQuestion}
                    onAnswer={handleAnswer}
                    onNext={() => setCurrentQuestion(c => Math.min(questions.length - 1, c + 1))}
                    onPrev={() => setCurrentQuestion(c => Math.max(0, c - 1))}
                    onComplete={handleComplete}
                    onCancel={mode === 'session-participant' ? handleReset : cancelToIntro}
                    headerLabel={headerLabel}
                    completing={completing}
                />;
            }

            // Resultaat
            if (screen === 'result') {
                return <ResultIndividual
                    name={participantName}
                    answers={answers}
                    sessionName={sessionName}
                    submissionStatus={submissionStatus}
                    mode={mode}
                    onReset={handleReset}
                    onNewParticipant={handleNewParticipant}
                    onViewTeam={handleViewTeam}
                    onShare={mode !== 'session-participant' ? handleShare : null}
                />;
            }

            // Team-resultaat lokaal
            if (screen === 'team-result') {
                return <ResultTeam
                    sessionName={sessionName}
                    participants={teamParticipants}
                    onAddParticipant={handleAddTeamParticipant}
                    onReset={handleReset}
                />;
            }

            return <CenteredMessage icon="🤔" title="Onbekend scherm" text="Er ging iets mis met de navigatie." actionLabel="Terug naar start" onAction={handleReset} />;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
